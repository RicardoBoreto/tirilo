# ALSA - Configuração padrão: EMEET Office Core M1A (E1102)
# Copiar para /etc/asound.conf no Raspberry Pi
# dmix permite que múltiplos programas usem o áudio simultaneamente

pcm.dmixer {
    type dmix
    ipc_key 1024
    slave {
        pcm "hw:CARD=M1A,DEV=0"
        rate 48000
        format S16_LE
        period_size 1024
        buffer_size 8192
    }
}

pcm.!default {
    type asym
    playback.pcm {
        type plug
        slave.pcm "dmixer"
    }
    capture.pcm {
        type plug
        slave.pcm "hw:CARD=M1A,DEV=0"
    }
}

ctl.!default {
    type hw
    card M1A
}
