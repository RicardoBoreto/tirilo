# ALSA - Configuração padrão: EMEET Office Core M1A (E1102)
# Copiar para /etc/asound.conf no Raspberry Pi
#
# Para descobrir o nome da placa:
#   arecord -l   (entrada)
#   aplay   -l   (saída)
# Ajuste "M1A" abaixo se o nome da placa for diferente.

pcm.!default {
    type asym
    playback.pcm {
        type plug
        slave.pcm "hw:CARD=M1A,DEV=0"
    }
    capture.pcm {
        type plug
        slave.pcm "hw:CARD=M1A,DEV=0"
    }
}

ctl.!default {
    type hw
    card M1A
}
